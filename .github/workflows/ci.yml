# This workflow will install Python dependencies, run tests and lint with a variety of Python versions
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-python

name: CI

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install . --group dev
        pip install genbadge[coverage]
    - name: Run pytest and code coverage
      run: |
        python -m pytest --cov=. --cov-report=html --cov-report=xml
    - name: Upload HTML report if check failed
      uses: actions/upload-artifact@v7
      with:
        name: html-report
        path: htmlcov

    - name: Generate badge with genbadge
      run: |
        # Creates an SVG badge at assets/coverage.svg using the coverage.xml report
        mkdir -p assets
        genbadge coverage -i coverage.xml -o assets/coverage.svg

    - name: Commit and push badge if changed
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add assets/coverage.svg
        # Only commit if the badge file actually changed to avoid endless loop runs
        git diff --quiet && git diff --staged --quiet || (git commit -m "docs: update coverage badge [skip ci]" && git push)

    - name: Lint with flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # exit-zero treats all errors as warnings. The GitHub editor is 127 chars wide
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics